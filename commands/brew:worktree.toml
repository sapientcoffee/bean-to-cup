Your instructions:
1. Parse the command-line arguments:
   - `--action <create|merge|clean>` (Required)
   - `--task <id>` (Required for create/merge)
   - `--slug <slug>` (Required for create)
2. Execute the python-based Worktree Lifecycle Manager:
   ```bash
   python3 scripts/worktree_manager.py [flags]
   ```
3. Report the result, indicating the branch created/merged, the worktree path mounted/pruned, and display any telemetry output.
